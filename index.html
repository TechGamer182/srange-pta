<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shooting Range - Prototype A</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            background-color: #121216;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin: 5px 0 15px 0;
            font-size: 28px;
            letter-spacing: 2px;
            color: #00aaff;
            text-align: center;
        }

        #top-bar {
            background: #252530;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        #mode-toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1e1e24;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #3a3a4a;
        }

        #mode-toggle-container label {
            color: #ffcc00;
            font-weight: bold;
            cursor: pointer;
        }

        #ui-container {
            display: none; /* Hidden by default at start since Normal Mode is active */
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #3d3d4f;
        }

        .slider-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
            background: #1b1b22;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #2d2d3d;
        }

        .slider-group label {
            color: #ccc;
            white-space: nowrap;
        }

        .slider-group input[type="range"] {
            flex: 1;
            accent-color: #00cc44;
            min-width: 50px;
        }

        .slider-group span {
            min-width: 30px;
            text-align: right;
            font-weight: bold;
            color: #00aaff;
        }

        #game-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3; 
            background-color: #000000;
            border: 4px solid #ffffff;
            border-radius: 6px;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        #sidebar-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 900px) {
            #game-layout { flex-direction: row; align-items: flex-start; }
            #canvas-container { flex: 1; }
            #sidebar-container { width: 280px; flex-shrink: 0; }
        }

        .side-panel {
            background: #252530;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
        }

        .side-panel h2 {
            margin-top: 0;
            font-size: 14px;
            color: #ffcc00;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        .shop-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 13px; }
        .leaderboard-entry { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; border-bottom: 1px solid #2d2d3d; padding-bottom: 4px; }

        #weapon-selector select, #account-panel input, #account-panel button, .shop-item button, #feedback-panel textarea, #feedback-panel button {
            width: 100%;
            background: #15151c;
            color: white;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 13px;
        }
        #account-panel button, .shop-item button, #feedback-panel button { background: #00aaff; border: none; font-weight: bold; cursor: pointer; }
        #account-panel button:hover, .shop-item button:hover, #feedback-panel button:hover { background: #0088cc; }
        .shop-item button { width: auto; padding: 4px 10px; }
        #account-panel button:disabled, .shop-item button:disabled, #feedback-panel button:disabled { background: #444; cursor: not-allowed; }

        #account-status { font-size: 13px; color: #00ff66; margin-bottom: 10px; text-align: center; }
        #gameover-screen {
            display: none;
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            flex-direction: column; align-items: center; justify-content: center;
            color: #ff3333; font-size: 30px; font-weight: bold; z-index: 10;
        }
    </style>
</head>
<body>

    <h1>Shooting Range - Prototype A</h1>

    <div id="top-bar">
        <div id="mode-toggle-container">
            <input type="checkbox" id="practiceModeToggle">
            <label for="practiceModeToggle">Practice Mode (No High Scores)</label>
        </div>

        <div id="ui-container">
            <div class="slider-group">
                <label for="rangeSlider">Weapon Range:</label>
                <input type="range" id="rangeSlider" min="100" max="800" value="400">
                <span id="rangeValue">400</span>
            </div>
            <div class="slider-group">
                <label for="bulletDmgSlider">Bullet Damage:</label>
                <input type="range" id="bulletDmgSlider" min="5" max="100" value="12">
                <span id="bulletDmgValue">12</span>
            </div>
            <div class="slider-group">
                <label for="enemyHpSlider">Enemy Health:</label>
                <input type="range" id="enemyHpSlider" min="10" max="400" value="96">
                <span id="enemyHpValue">96</span>
            </div>
        </div>
    </div>

    <div id="game-layout">
        <div id="canvas-container">
            <div id="gameover-screen">
                <div>GAME OVER</div>
                <button id="respawn-btn" style="margin-top:20px; padding: 10px 30px; font-size:16px;">Respawn</button>
            </div>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div id="sidebar-container">
            <div id="account-panel" class="side-panel">
                <h2>Profile Account</h2>
                <div id="account-status">Playing as: Guest</div>
                <input type="text" id="username-input" placeholder="Set Username to Save" maxlength="12">
                <button id="login-btn">Lock Name & Sync</button>
            </div>

            <div id="feedback-panel" class="side-panel">
                <h2>Submit Feedback</h2>
                <textarea id="feedback-text" rows="3" placeholder="Describe bugs or features..." style="resize: none; margin-bottom: 8px; font-family: inherit;"></textarea>
                <button id="submit-feedback-btn">Send to Developer</button>
            </div>

            <div class="side-panel">
                <h2>Upgrades Shop</h2>
                <div class="shop-item">
                    <span>Attack Buff (Cost: 250)</span>
                    <button id="buy-dmg-btn">Buy</button>
                </div>
                <div class="shop-item">
                    <span>Speed Boots (Cost: 70)</span>
                    <button id="buy-speed-btn">Buy</button>
                </div>
            </div>

            <div id="weapon-selector" class="side-panel">
                <h2>Weapon Selection</h2>
                <select id="weapon-type-select">
                    <option value="rifle">Assault Rifle</option>
                    <option value="shotgun">Tactical Shotgun</option>
                    <option value="sniper">Heavy Sniper</option>
                </select>
            </div>

            <div id="leaderboard" class="side-panel">
                <h2>Global Top 5</h2>
                <div id="leaderboard-content">Connecting...</div>
            </div>
        </div>
    </div>

<script>
    const dbClient = supabase.createClient('https://YOUR_SUPABASE_URL.supabase.co', 'YOUR_SUPABASE_ANON_KEY');

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const WORLD_WIDTH = 2000;
    const WORLD_HEIGHT = 1600;

    let score = 0;
    let coins = 0;
    let username = "Guest";
    // FIX: Set to false by default so game launches in standard Normal Mode
    let isPractice = false; 
    let nameLocked = false;
    let gameOver = false;

    let currentWave = 1;
    let waveTimer = 0; 
    const WAVE_DURATION = 3600; 

    let dmgUpgrade = 1.0;
    let speedUpgrade = 0;
    
    const BASE_BULLET_DMG = 12;
    const START_ENEMY_HP = 96; 
    const HP_INCREASE_PER_WAVE = 17; 

    const player = { x: 1000, y: 800, size: 22, baseSpeed: 4.5, hp: 100, maxHp: 100, angle: 0 };
    const blocks = [{x: 400, y: 500, w: 200, h: 200}, {x: 1300, y: 400, w: 300, h: 100}, {x: 900, y: 1100, w: 250, h: 250}];
    const sausages = [{x: 600, y: 300}, {x: 1500, y: 1200}, {x: 800, y: 700}];
    
    let targets = [];
    let bullets = [];
    let droppedCoins = [];
    let keysPressed = {};
    let mouseX = 0, mouseY = 0, isMouseDown = false, fireCooldown = 0;

    window.addEventListener("keydown", e => keysPressed[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keysPressed[e.key.toLowerCase()] = false);
    canvas.addEventListener("mousedown", () => isMouseDown = true);
    window.addEventListener("mouseup", () => isMouseDown = false);
    canvas.addEventListener("mousemove", e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
    });

    // FIX: Wiped current wallet balance when switching modes so practice funds don't carry into live mode
    document.getElementById("practiceModeToggle").addEventListener("change", e => {
        isPractice = e.target.checked;
        document.getElementById("ui-container").style.display = isPractice ? "grid" : "none";
        
        coins = 0;
        score = 0;
        dmgUpgrade = 1.0;
        speedUpgrade = 0;
        currentWave = 1;
        waveTimer = 0;
        
        bullets = [];
        targets = [];
        droppedCoins = [];
        for(let i=0; i<6; i++) generateEnemy();
    });

    document.getElementById("rangeSlider").addEventListener("input", e => document.getElementById("rangeValue").textContent = e.target.value);
    document.getElementById("bulletDmgSlider").addEventListener("input", e => document.getElementById("bulletDmgValue").textContent = e.target.value);
    document.getElementById("enemyHpSlider").addEventListener("input", e => document.getElementById("enemyHpValue").textContent = e.target.value);

    document.getElementById("submit-feedback-btn").addEventListener("click", async () => {
        const text = document.getElementById("feedback-text").value.trim();
        if(!text) return;

        const btn = document.getElementById("submit-feedback-btn");
        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
            const { error } = await dbClient.from('feedback').insert({
                username: username,
                message: text,
                target_developer: 'nic18.game@gmail.com',
                created_at: new Date().toISOString()
            });

            if(!error) {
                btn.textContent = "Sent successfully!";
                document.getElementById("feedback-text").value = "";
            } else {
                btn.textContent = "Error saving";
            }
        } catch (e) {
            btn.textContent = "Network Error";
        }

        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = "Send to Developer";
        }, 3000);
    });

    function getCurrentEnemyBaseHp() {
        if (isPractice) {
            return parseInt(document.getElementById("enemyHpSlider").value);
        }
        return START_ENEMY_HP + (currentWave - 1) * HP_INCREASE_PER_WAVE;
    }

    function generateEnemy() {
        let hpVal = getCurrentEnemyBaseHp();
        targets.push({
            x: Math.random() * (WORLD_WIDTH - 200) + 100,
            y: Math.random() * (WORLD_HEIGHT - 200) + 100,
            size: 28,
            hp: hpVal,
            maxHp: hpVal
        });
    }
    
    for(let i=0; i<6; i++) generateEnemy();

    document.getElementById("login-btn").addEventListener("click", () => {
        if(score > 0) return; 
        const val = document.getElementById("username-input").value.trim();
        if(val && val.toLowerCase() !== "guest") {
            username = val;
            nameLocked = true;
            document.getElementById("username-input").disabled = true;
            document.getElementById("login-btn").disabled = true;
            document.getElementById("account-status").textContent = `Locked Profile: ${username}`;
            sendScoreUpdate();
        }
    });

    document.getElementById("buy-dmg-btn").addEventListener("click", () => {
        let currentPlayerDmg = (isPractice ? parseInt(document.getElementById("bulletDmgSlider").value) : BASE_BULLET_DMG) * dmgUpgrade;
        let currentEnemyHp = getCurrentEnemyBaseHp();
        let tapsRequired = currentEnemyHp / currentPlayerDmg;

        if(coins >= 250 && tapsRequired >= 25) {
            coins -= 250;
            dmgUpgrade += 2.125; 
        }
    });

    document.getElementById("buy-speed-btn").addEventListener("click", () => { if(coins >= 70) { coins -= 70; speedUpgrade += 0.8; } });
    
    document.getElementById("respawn-btn").addEventListener("click", () => {
        player.hp = player.maxHp; score = 0; coins = 0; currentWave = 1; waveTimer = 0; player.x = 1000; player.y = 800;
        dmgUpgrade = 1.0; speedUpgrade = 0;
        bullets = []; targets = []; droppedCoins = []; for(let i=0; i<6; i++) generateEnemy();
        gameOver = false; document.getElementById("gameover-screen").style.display = "none";
    });

    async function fetchLeaderboard() {
        try {
            const { data, error } = await dbClient.from('leaderboard').select('username, score').order('score', { ascending: false }).limit(5);
            if (!error && data) {
                document.getElementById("leaderboard-content").innerHTML = "";
                data.forEach((entry, idx) => {
                    document.getElementById("leaderboard-content").innerHTML += `<div class="leaderboard-entry"><span>${idx+1}. ${entry.username}</span><span>${entry.score}</span></div>`;
                });
            }
        } catch(err){}
    }

    async function sendScoreUpdate() {
        if (!nameLocked || isPractice) return;
        try {
            await dbClient.from('leaderboard').upsert({ username: username, score: score }, { onConflict: 'username' });
            fetchLeaderboard();
        } catch(e){}
    }

    function loop() {
        if (!gameOver) {
            if (!isPractice) {
                waveTimer++;
                if (waveTimer >= WAVE_DURATION) {
                    waveTimer = 0;
                    currentWave++;
                    generateEnemy(); 
                }
            }

            let movementSpeed = player.baseSpeed + speedUpgrade;
            let nextX = player.x, nextY = player.y;

            if (keysPressed['w']) nextY -= movementSpeed;
            if (keysPressed['s']) nextY += movementSpeed;
            if (keysPressed['a']) nextX -= movementSpeed;
            if (keysPressed['d']) nextX += movementSpeed;

            let blocked = false;
            blocks.forEach(b => {
                if (nextX - player.size < b.x + b.w && nextX + player.size > b.x && nextY - player.size < b.y + b.h && nextY + player.size > b.y) blocked = true;
            });
            if (!blocked) {
                player.x = Math.max(player.size, Math.min(WORLD_WIDTH - player.size, nextX));
                player.y = Math.max(player.size, Math.min(WORLD_HEIGHT - player.size, nextY));
            }

            let camX = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, player.x - canvas.width / 2));
            let camY = Math.max(0, Math.min(WORLD_HEIGHT - canvas.height, player.y - canvas.height / 2));

            player.angle = Math.atan2((mouseY + camY) - player.y, (mouseX + camX) - player.x);

            if (fireCooldown > 0) fireCooldown--;
            if (isMouseDown && fireCooldown === 0) {
                let bulletBaseDmg = isPractice ? parseInt(document.getElementById("bulletDmgSlider").value) : BASE_BULLET_DMG;
                bullets.push({
                    x: player.x, y: player.y, startX: player.x, startY: player.y,
                    dx: Math.cos(player.angle) * 14, dy: Math.sin(player.angle) * 14,
                    range: parseInt(document.getElementById("rangeSlider").value),
                    dmg: bulletBaseDmg * dmgUpgrade
                });
                fireCooldown = 12;
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; b.x += b.dx; b.y += b.dy;
                if (Math.hypot(b.x - b.startX, b.y - b.startY) > b.range) { bullets.splice(i, 1); continue; }

                for (let j = targets.length - 1; j >= 0; j--) {
                    let t = targets[j];
                    if (Math.hypot(b.x - t.x, b.y - t.y) < t.size / 2) {
                        t.hp -= b.dmg; bullets.splice(i, 1);
                        if (t.hp <= 0) {
                            droppedCoins.push({ x: t.x, y: t.y, val: 15 });
                            targets.splice(j, 1);
                            if (!isPractice) { score += 10; sendScoreUpdate(); }
                            generateEnemy();
                        }
                        break;
                    }
                }
            }

            for (let i = droppedCoins.length - 1; i >= 0; i--) {
                let c = droppedCoins[i];
                if (Math.hypot(player.x - c.x, player.y - c.y) < 25) {
                    coins += c.val;
                    droppedCoins.splice(i, 1);
                }
            }

            ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-camX, -camY);

            ctx.strokeStyle = "#16161a"; ctx.lineWidth = 1;
            for(let x=0; x<WORLD_WIDTH; x+=60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,WORLD_HEIGHT); ctx.stroke(); }
            for(let y=0; y<WORLD_HEIGHT; y+=60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(WORLD_WIDTH,y); ctx.stroke(); }

            ctx.fillStyle = "#252530"; blocks.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            ctx.fillStyle = "#FFD700";
            sausages.forEach(s => {
                ctx.fillRect(s.x, s.y, 25, 12);
                if(Math.hypot(player.x - s.x, player.y - s.y) < 30) {
                    player.hp = Math.min(player.maxHp, player.hp + 20);
                    s.x = Math.random() * (WORLD_WIDTH - 100) + 50; s.y = Math.random() * (WORLD_HEIGHT - 100) + 50;
                }
            });

            ctx.fillStyle = "#ffcc00"; droppedCoins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 6, 0, Math.PI*2); ctx.fill(); });

            targets.forEach(t => {
                if (!isPractice) {
                    let angle = Math.atan2(player.y - t.y, player.x - t.x);
                    let targetNextX = t.x + Math.cos(angle) * 1.6;
                    let targetNextY = t.y + Math.sin(angle) * 1.6;

                    blocks.forEach(b => {
                        if (targetNextX - t.size/2 < b.x + b.w && targetNextX + t.size/2 > b.x && t.y - t.size/2 < b.y + b.h && t.y + t.size/2 > b.y) {
                            targetNextX = t.x; 
                        }
                        if (t.x - t.size/2 < b.x + b.w && t.x + t.size/2 > b.x && targetNextY - t.size/2 < b.y + b.h && targetNextY + t.size/2 > b.y) {
                            targetNextY = t.y; 
                        }
                    });

                    t.x = targetNextX; t.y = targetNextY;

                    if (Math.hypot(player.x - t.x, player.y - t.y) < (player.size + t.size / 2)) {
                        player.hp -= 0.5;
                        if (player.hp <= 0) { gameOver = true; document.getElementById("gameover-screen").style.display = "flex"; }
                    }
                }
                ctx.fillStyle = "#ff3333"; ctx.fillRect(t.x - t.size/2, t.y - t.size/2, t.size, t.size);
                ctx.fillStyle = "#555"; ctx.fillRect(t.x - t.size/2, t.y - t.size/2 - 8, t.size, 4);
                ctx.fillStyle = "#00ff00"; ctx.fillRect(t.x - t.size/2, t.y - t.size/2 - 8, t.size * (t.hp / t.maxHp), 4);
            });

            ctx.fillStyle = "#ffff00"; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, Math.PI*2); ctx.fill(); });

            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
            ctx.fillStyle = "#00aaff"; ctx.beginPath(); ctx.moveTo(16, 0); ctx.lineTo(-10, -9); ctx.lineTo(-6, 0); ctx.lineTo(-10, 9); ctx.closePath(); ctx.fill();
            ctx.restore();

            ctx.restore();

            ctx.fillStyle = "#ffffff"; ctx.font = "bold 15px sans-serif";
            ctx.fillText(`Leaderboard Points: ${score}`, 20, 35);
            ctx.fillText(`Wallet Coins: $${coins}`, 20, 55);
            ctx.fillText(`Wave: ${currentWave}`, 20, 75);
            
            ctx.fillStyle = "#ff3333"; ctx.fillRect(20, 88, 140, 8);
            ctx.fillStyle = "#00ff66"; ctx.fillRect(20, 88, 140 * (player.hp / player.maxHp), 8);
        }

        let currentBulletBase = isPractice ? parseInt(document.getElementById("bulletDmgSlider").value) : BASE_BULLET_DMG;
        let activePowerDmg = currentBulletBase * dmgUpgrade;
        let activeEnemyHp = getCurrentEnemyBaseHp();
        let currentTapsToKill = activeEnemyHp / activePowerDmg;

        document.getElementById("buy-dmg-btn").disabled = coins < 250 || currentTapsToKill < 25;
        document.getElementById("buy-speed-btn").disabled = coins < 70;
        
        requestAnimationFrame(loop);
    }

    fetchLeaderboard();
    loop();
</script>
</body>
</html>
